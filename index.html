<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umesh Joshi | Battery Engineer Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0062ff;
            --bg: #050a15;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: flex-end; align-items: center;
            padding: 20px 5%; background: rgba(5, 10, 21, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: var(--primary); }
        .lang-btn { background: var(--secondary); border: none; color: #fff; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* --- HERO SECTION --- */
        #hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #102040 0%, #050a15 100%); }
        
        /* SLEEK CSS EV CAR */
        .car-container { width: 300px; height: 100px; position: relative; margin-bottom: 40px; }
        .car-body { width: 250px; height: 40px; background: #111; border: 2px solid var(--primary); border-radius: 50px 100px 10px 10px; position: relative; box-shadow: 0 0 20px var(--primary); }
        .car-body::after { content: ''; position: absolute; top: 5px; left: 140px; width: 80px; height: 20px; border: 2px solid var(--primary); border-radius: 0 50px 0 0; }
        .wheel { width: 30px; height: 30px; background: #000; border: 2px solid var(--primary); border-radius: 50%; position: absolute; bottom: -15px; animation: spin 2s linear infinite; }
        .w1 { left: 40px; } .w2 { right: 40px; }
        .headlight { position: absolute; right: 5px; top: 20px; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; box-shadow: 10px 0 30px var(--primary); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hero-title { font-size: 3.5rem; margin-bottom: 10px; font-weight: 700; letter-spacing: -1px; }
        .hero-subtitle { font-size: 1.2rem; color: var(--primary); opacity: 0.9; margin-bottom: 30px; }
        .cv-btn { padding: 12px 30px; border: 2px solid var(--primary); color: var(--primary); text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.4s; }
        .cv-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

        /* --- SECTIONS --- */
        section { padding: 100px 8%; min-height: 100vh; }
        .section-header { font-size: 2.5rem; margin-bottom: 50px; border-left: 5px solid var(--primary); padding-left: 20px; }

        /* --- ABOUT --- */
        .about-box { display: flex; gap: 50px; align-items: center; background: var(--glass); padding: 40px; border-radius: 30px; }
        .about-img { width: 300px; height: 400px; object-fit: cover; border-radius: 20px; border: 2px solid var(--primary); }
        .about-text { font-size: 1.1rem; line-height: 1.8; color: #ccd6f6; }

        /* --- VERTICAL CARDS (EXPERIENCE) --- */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .v-card { height: 500px; perspective: 1000px; cursor: pointer; }
        .v-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); transform-style: preserve-3d; }
        .v-card.flipped .v-card-inner { transform: rotateY(180deg); }
        
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 20px; padding: 30px; background: linear-gradient(145deg, #0f172a, #050a15);
            border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
        }
        .card-back { transform: rotateY(180deg); background: #0a1122; overflow-y: auto; }

        .card-title { font-size: 1.6rem; color: var(--primary); margin-bottom: 10px; font-weight: 700; }
        .card-subtitle { font-size: 0.9rem; color: var(--secondary); margin-bottom: 20px; font-weight: 600; }
        .task-points { list-style: none; font-size: 0.95rem; color: #94a3b8; }
        .task-points li { margin-bottom: 12px; position: relative; padding-left: 20px; }
        .task-points li::before { content: '→'; position: absolute; left: 0; color: var(--primary); }
        
        .learn-more { position: absolute; bottom: 30px; right: 30px; font-weight: bold; color: var(--primary); font-size: 0.8rem; }
        
        .skills-tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; opacity: 0; transform: translateY(10px); transition: 0.5s 0.3s; }
        .v-card.flipped .skills-tag-container { opacity: 1; transform: translateY(0); }
        .s-tag { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--primary); color: var(--primary); padding: 3px 10px; border-radius: 5px; font-size: 0.7rem; }

        /* --- SKILLS --- */
        .skills-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .skill-cat h3 { color: var(--primary); margin-bottom: 20px; font-size: 1.4rem; }
        .skill-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .skill-item { background: var(--glass); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .skill-item:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* --- CONTACT --- */
        .contact-box { display: flex; gap: 50px; background: var(--glass); padding: 50px; border-radius: 30px; align-items: center; }
        .contact-img { width: 250px; height: 250px; border-radius: 50%; object-fit: cover; border: 5px solid var(--secondary); }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .social-link { background: var(--secondary); color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 15px; font-weight: bold; transition: 0.3s; }
        .social-link:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        @media (max-width: 768px) {
            .about-box, .contact-box { flex-direction: column; text-align: center; }
            .skills-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="#hero" data-en="Home" data-de="Home">Home</a>
            <a href="#about" data-en="About" data-de="Über mich">About</a>
            <a href="#experience" data-en="Experience" data-de="Erfahrung">Experience</a>
            <a href="#education" data-en="Education" data-de="Bildung">Education</a>
            <a href="#skills" data-en="Skills" data-de="Skills">Skills</a>
            <a href="#contact" data-en="Contact" data-de="Kontakt">Contact</a>
            <button class="lang-btn" onclick="toggleLang()">EN / DE</button>
        </div>
    </nav>

    <section id="hero">
        <div class="car-container">
            <div class="car-body">
                <div class="headlight"></div>
                <div class="wheel w1"></div>
                <div class="wheel w2"></div>
            </div>
        </div>
        <h1 class="hero-title" data-en="Welcome to Umesh Joshi's Portfolio" data-de="Willkommen in Umesh Joshis Portfolio">Welcome to Umesh Joshi's Portfolio</h1>
        <p class="hero-subtitle" data-en="M.Eng in Renewable Energies & E-Mobility | Battery Engineer" data-de="M.Eng Erneuerbare Energien & E-Mobilität | Batterie-Ingenieur">M.Eng in Renewable Energies & E-Mobility | Battery Engineer</p>
        <a href="UmeshJ_Lebenslauf_.pdf" download class="cv-btn" data-en="Download CV" data-de="Lebenslauf Herunterladen">Download CV</a>
    </section>

    <section id="about">
        <h2 class="section-header" data-en="Motivation & Goals" data-de="Motivation & Ziele">Motivation & Goals</h2>
        <div class="about-box">
            <img src="avatar.jpg" alt="Umesh Joshi" class="about-img">
            <p class="about-text" id="about-content"></p>
        </div>
    </section>

    <section id="experience">
        <h2 class="section-header" data-en="Professional Experience" data-de="Berufserfahrung">Professional Experience</h2>
        <div class="grid-container" id="exp-container"></div>
    </section>

    <section id="education">
        <h2 class="section-header" data-en="Education" data-de="Ausbildung">Education</h2>
        <div class="grid-container" id="edu-container"></div>
    </section>

    <section id="skills">
        <h2 class="section-header" data-en="Technical Arsenal" data-de="Technische Kenntnisse">Technical Arsenal</h2>
        <div class="skills-section" id="skills-container"></div>
    </section>

    <section id="contact">
        <h2 class="section-header" data-en="Get in Touch" data-de="Kontakt">Get in Touch</h2>
        <div class="contact-box">
            <img src="avatar2.jpg" alt="Contact Umesh" class="contact-img">
            <div style="flex:1">
                <p style="margin-bottom: 20px; font-size: 1.1rem;" data-en="Currently based in Esslingen, Germany. Let's build the future of E-Mobility together." data-de="Derzeit wohnhaft in Esslingen, Deutschland. Lassen Sie uns gemeinsam die Zukunft der E-Mobilität gestalten."></p>
                <div class="social-grid">
                    <a href="mailto:ujoshi@example.com" class="social-link">Email</a>
                    <a href="#" class="social-link">LinkedIn</a>
                    <a href="#" class="social-link">XING</a>
                    <a href="#" class="social-link">Indeed</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        let lang = 'en';

        const data = {
            en: {
                about: "Innovative Electrical Engineer with a focus on Lithium-Ion Battery development. My goal is to revolutionize EV range and safety through advanced voltage relaxation modeling and predictive algorithms. With a Master’s degree (Grade 1.0 thesis at Mercedes-Benz), I bring a blend of machine learning expertise and core electrochemical understanding to the table.",
                exp: [
                    { title: "Werkstudent – Battery Algorithms", comp: "Mercedes-Benz AG, Stuttgart", date: "08.2025 – Ongoing", p1: "Researching voltage relaxation for Supervised ML framework.", p2: "Creating structured anomaly datasets for future validation.", deep: "Conducted fundamental research to extend relaxation models. Applied machine learning for predictive battery analytics. Created data catalogs based on experimental measurements.", tags: ["Python", "ML", "Battery Modeling"] },
                    { title: "Master Thesis: Voltage Prediction", comp: "Mercedes-Benz AG, Stuttgart", date: "12.2024 – 07.2025", p1: "Achieved 1.0 Grade in battery modeling.", p2: "Improved model accuracy by 85% via CyIPOPT.", deep: "Developed advanced relaxation models using modern Python frameworks. Implemented adaptive optimization algorithms. Significantly improved SOC estimation accuracy.", tags: ["CyIPOPT", "Optimization", "SOC Estimation"] },
                    { title: "Working Student HV Development", comp: "Mercedes-Benz AG, Stuttgart", date: "02.2024 – 11.2024", p1: "Automated data analysis using MATLAB (95% faster).", p2: "Built 3D simulation models in CST Studio.", deep: "Parametrization of 3D models. Conducted impedance measurements and created AC/DC magnetometer manuals.", tags: ["MATLAB", "CST Studio", "Simulink"] },
                    { title: "Working Student Validation", comp: "ElringKlinger AG, Neuffen", date: "11.2023 – 01.2024", p1: "Tested battery cells and components.", p2: "Evaluated data using X-Frame and DIAdem.", deep: "Executed test cases for battery performance and safety. Contributed to ECU hardware designs.", tags: ["DIAdem", "X-Frame", "Testing"] },
                    { title: "Intern: Battery Systems", comp: "ElringKlinger AG, Neuffen", date: "05.2023 – 11.2023", p1: "Conducted impedance measurements on foils.", p2: "Ensured safety standards for battery drives.", deep: "Created test protocols and documented results for safety validation of ECUs and battery systems.", tags: ["Validation", "Impedance", "ECU"] }
                ],
                edu: [
                    { title: "Master of Engineering", comp: "Hochschule Stralsund", date: "2022 – 2025", p1: "Focus: E-Mobility & Vehicle Management.", p2: "Deep knowledge in Hydrogen Tech.", deep: "Specialized in System Theory, Control of Electric Drives, and Vehicle Simulation.", tags: ["Renewable Energy", "E-Mobility"] },
                    { title: "Bachelor of Engineering", comp: "University of Mumbai", date: "2018 – 2021", p1: "Grade: 1.3 (Outstanding).", p2: "Second place in department.", deep: "Core focus on Power Electronics, Electrical Machines, and Network Theory.", tags: ["Electrical Engineering", "Power Systems"] },
                    { title: "Diploma in Electrical", comp: "MSBTE Mumbai", date: "2015 – 2018", p1: "Grade: 1.9.", p2: "Basics of AC/DC machines.", deep: "Fundamentals of circuits and microcontrollers.", tags: ["Circuits", "Control"] }
                ],
                skills: {
                    "Software & Engineering": ["MATLAB/Simulink", "Python (Pandas, NumPy)", "C++", "C", "LT Spice"],
                    "Tools & Protocols": ["CANoe", "CANalyzer", "PREEvision", "AUTOSAR", "GitHub Copilot", "VS-Code"]
                }
            },
            de: {
                about: "Innovativer Elektroingenieur mit Fokus auf Lithium-Ionen-Batterieentwicklung. Mein Ziel ist es, die Reichweite und Sicherheit von E-Fahrzeugen durch fortschrittliche Spannungsrelaxationsmodellierung zu revolutionieren.",
                exp: [
                    { title: "Werkstudent – Batteriealgorithmen", comp: "Mercedes-Benz AG, Stuttgart", date: "08.2025 – Heute", p1: "Forschung zur Spannungsrelaxation für ML-Frameworks.", p2: "Erstellung von Anomalie-Datensätzen.", deep: "Grundlagenforschung zur Erweiterung von Relaxationsmodellen. Anwendung von ML für prädiktive Analysen.", tags: ["Python", "ML", "Batteriemodellierung"] },
                    { title: "Masterarbeit: Spannungsvorhersage", comp: "Mercedes-Benz AG, Stuttgart", date: "12.2024 – 07.2025", p1: "Note 1.0 in Batteriemodellierung.", p2: "Modellgenauigkeit um 85% verbessert.", deep: "Entwicklung fortgeschrittener Relaxationsmodelle in Python. Deutliche Verbesserung der SOC-Schätzgenauigkeit.", tags: ["CyIPOPT", "Optimierung", "SOC-Schätzung"] },
                    { title: "Werkstudent HV-Entwicklung", comp: "Mercedes-Benz AG, Stuttgart", date: "02.2024 – 11.2024", p1: "Automatisierung mit MATLAB (95% schneller).", p2: "3D-Simulation in CST Studio.", deep: "Parametrierung von 3D-Modellen. Durchführung von Impedanzmessungen.", tags: ["MATLAB", "CST Studio", "Simulink"] },
                    { title: "Werkstudent Validierung", comp: "ElringKlinger AG, Neuffen", date: "11.2023 – 01.2024", p1: "Testen von Batteriezellen.", p2: "Auswertung mit X-Frame und DIAdem.", deep: "Durchführung von Testfällen für Batteriesicherheit. Hardware-Design von ECUs.", tags: ["DIAdem", "X-Frame", "Testing"] },
                    { title: "Praktikum: Batteriesysteme", comp: "ElringKlinger AG, Neuffen", date: "05.2023 – 11.2023", p1: "Impedanzmessungen an Folien.", p2: "Sicherstellung von Sicherheitsstandards.", deep: "Erstellung von Testprotokollen für Sicherheitsvalidierung.", tags: ["Validierung", "Impedanz", "ECU"] }
                ],
                edu: [
                    { title: "Master of Engineering", comp: "Hochschule Stralsund", date: "2022 – 2025", p1: "Schwerpunkt: E-Mobilität.", p2: "Vertiefte Kenntnisse in Wasserstofftech.", deep: "Fahrzeugsimulation und Steuerung elektrischer Antriebe.", tags: ["Erneuerbare Energien", "E-Mobilität"] },
                    { title: "Bachelor of Engineering", comp: "University of Mumbai", date: "2018 – 2021", p1: "Note: 1.3.", p2: "Zweiter Platz im Fachbereich.", deep: "Leistungselektronik und elektrische Maschinen.", tags: ["Elektrotechnik", "Energiesysteme"] },
                    { title: "Diplom Elektrotechnik", comp: "MSBTE Mumbai", date: "2015 – 2018", p1: "Note: 1.9.", p2: "Grundlagen der Energietechnik.", deep: "Schaltungen und Mikrocontroller.", tags: ["Schaltkreise", "Steuerung"] }
                ],
                skills: {
                    "Software & Engineering": ["MATLAB/Simulink", "Python (Pandas, NumPy)", "C++", "C", "LT Spice"],
                    "Tools & Protokolle": ["CANoe", "CANalyzer", "PREEvision", "AUTOSAR", "GitHub Copilot", "VS-Code"]
                }
            }
        };

        function toggleLang() {
            lang = lang === 'en' ? 'de' : 'en';
            render();
        }

        function createCard(item) {
            return `
                <div class="v-card" onclick="this.classList.toggle('flipped')">
                    <div class="v-card-inner">
                        <div class="card-front">
                            <h3 class="card-title">${item.title}</h3>
                            <p class="card-subtitle">${item.date}<br>${item.comp}</p>
                            <ul class="task-points">
                                <li>${item.p1}</li>
                                <li>${item.p2}</li>
                            </ul>
                            <div class="learn-more">LEARN MORE →</div>
                        </div>
                        <div class="card-back">
                            <h3 class="card-title" style="font-size: 1.1rem">${item.title}</h3>
                            <p style="font-size: 0.85rem; color: #cbd5e1; margin-bottom: 15px;">${item.deep}</p>
                            <div class="skills-tag-container">
                                ${item.tags.map(t => `<span class="s-tag">${t}</span>`).join('')}
                            </div>
                            <div class="learn-more">BACK ←</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            // About
            document.getElementById('about-content').innerText = data[lang].about;
            
            // Experience
            document.getElementById('exp-container').innerHTML = data[lang].exp.map(i => createCard(i)).join('');
            
            // Education
            document.getElementById('edu-container').innerHTML = data[lang].edu.map(i => createCard(i)).join('');
            
            // Skills
            let skillsHTML = '';
            for (const [cat, list] of Object.entries(data[lang].skills)) {
                skillsHTML += `
                    <div class="skill-cat">
                        <h3>${cat}</h3>
                        <div class="skill-list">
                            ${list.map(s => `<div class="skill-item">${s}</div>`).join('')}
                        </div>
                    </div>
                `;
            }
            document.getElementById('skills-container').innerHTML = skillsHTML;

            // Titles
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
        }

        render();
    </script>
</body>
</html>
